<!-- Use CSS to create an Amazon "Add to Cart" button-->
 <!-- Use CSS to recreate these buttons from famous websites-->

<style>
  .add-button {
    background-color: rgb(255, 216, 20);
    border: none;
    height: 40px;
    width: 180px;
    border-radius: 20px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .add-button:hover {
    opacity: 0.8;
  }
</style>

<button class="add-button">
  Add to Cart
</button>
