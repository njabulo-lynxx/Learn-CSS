<!-- Use CSS to create a Bootstrap "Get started" button and "Download" button-->

<style>
  .get-started-button {
    background-color: rgb(121, 82, 179);
    border: none;
    color: white;
    font-weight: bold;
    height: 40px;
    width: 110px;
    border-radius: 4px;
    margin-right: 10px;
    cursor: pointer;
  }

  .download-button {
    background-color: white;
    color: rgb(108, 117, 125);
    height: 40px;
    width: 110px;
    border-radius: 4px;
    border-width: 1px;
    border-style: solid;
    cursor: pointer;
  }

</style>

<button class="get-started-button">
  Get started
</button>

<button class="download-button">
  Download
</button>
