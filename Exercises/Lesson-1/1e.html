<!-- Use CSS to create a LinkedIn "Apply on company website" button and "Save" button-->

<style>
  .apply-button {
    background-color: rgb(10, 102, 194);
    border: none;
    color: white;
    font-weight: bold;
    height: 40px;
    width: 230px;
    border-radius: 20px;
    cursor: pointer;
  }

  .save-button {
    background-color: white;
    color: rgb(10, 102, 194);
    font-weight: bold;
    border-width: 1px;
    border-style: solid;
    height: 40px;
    width: 100px;
    border-radius: 20px;
    margin-left: 10px;
    cursor: pointer;
  }
</style>

<button class="apply-button">
  Apply on company website
</button>

<button class="save-button">
  Save
</button>
