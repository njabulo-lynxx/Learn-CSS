<!DOCTYPE html>
<html>
  <head>
    <title>Lesson 6: Exercise F</title>
    <style>
      p {
        font-family: Arial;
        margin-top: 0;
        margin-bottom: 0;
      }
      .div-example {
        border-width: 1px;
        border-radius: 5px;
        width: 180px;
        border-style: solid;
      }
      .avatar {
        width: 180px;
      }
      .name {
        font-size: 15px;
        font-weight: bold;
        margin-bottom: 5px;
        margin-top: 5px;
        margin-left: 5px;
        margin-right: 5px;
      }
      .friend {
        color: rgba(177, 172, 172, 0.89);
        font-size: 14px;
        margin-bottom: 15px;
        margin-top: 5px;
        margin-left: 5px;
        margin-right: 5px;
      }
      .add-friend {
        background-color: blue;
        color: white;
        font-weight: bold;
        border: 0;
        border-radius: 4px;
        padding-bottom: 10px;
        padding-top: 10px;
        padding-left: 16px;
        padding-right: 16px;
        margin-left: 5px;
        margin-right: 5px;
        margin-bottom: 5px;
      }
    </style>
  </head>
  <body>
    <!--Recreate this design-->
    <div class="div-example">
      <img class="avatar" src="Cat-1.jpg">
      <p class="name">
        Garfield
      </p>
      <p class="friend">
        2 mutual friends
      </p>
      <button class="add-friend">
        Add Friend
      </button>
    </div>
  </body>
</html>
