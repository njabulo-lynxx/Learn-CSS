<!DOCTYPE html>
<html>
  <head>
    <title>Lesson 6: Exercise E</title>
    <style>
      .div-example {
        width: 350px;
        border-width: 1px;
        border-radius: 5px;
        box-shadow: 1px 1px 5px rgba(0, 0, 0, 0.15);
        padding: 12px;
      }
      .user-avatar {
        width: 50px;
        border-radius: 25px;
        vertical-align: middle;
        margin-right: 5px;
      }
      .status {
        width: 200px;
        border: 0px;
        vertical-align: middle;
        margin-right: 5px;
      }
      .tweet {
        background-color: rgb(145, 200, 245);
        color: rgb(255, 255, 255);
        font-weight: bold;
        font-size: 14px;
        border: 0;
        border-radius: 20px;
        padding-bottom: 10px;
        padding-top: 10px;
        padding-left: 16px;
        padding-right: 16px;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <!--Take the design created in exercise 7g. Wrap it in a <div>
      and give it a shadow-->
      <div class="div-example">
        <img class="user-avatar" src="Cat-1.jpg">
        <input class="status" type="text" placeholder="What's happening?">
        <button class="tweet">
          Tweet
        </button>
      </div>
  </body>
</html>
