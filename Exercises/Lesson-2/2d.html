<!-- Recreate a 'margin and padding together' design using the Box Model-->

<style>
  .one-button {
    padding-top: 10px;
    padding-bottom: 10px;
    padding-left: 16px;
    padding-right: 16px;
     margin-right: 5px;
    border: none;
    background-color: green;
    color: white;
    cursor: pointer;
    transition: padding-left 0.15s, padding-right 0.15s;
  }

  .one-button:hover {
    padding-left: 20px;
    padding-right: 20px;
  }

  .two-button {
    padding-top: 10px;
    padding-bottom: 10px;
    padding-left: 16px;
    padding-right: 16px;
    margin-left: 5px;
    margin-right: 5px;
    border: none;
    background-color: green;
    color: white;
    cursor: pointer;
    transition: padding-left 0.15s, padding-right 0.15s;
  }

  .two-button:hover {
    padding-left: 21px;
    padding-right: 21px;
    margin-left: 0px;
    margin-right: 0px;
  }

  .three-button {
    padding-top: 10px;
    padding-bottom: 10px;
    padding-left: 16px;
    padding-right: 16px;
     margin-left: 5px;
    border: none;
    background-color: green;
    color: white;
    cursor: pointer;
    transition: padding-left 0.15s, padding-right 0.15s;
  }

  .three-button:hover {
    padding-left: 20px;
    padding-right: 20px;
  }
</style>

<button class="one-button">
  One
</button>

<button class="two-button">
  Two
</button>

<button class="three-button">
  Three
</button>
